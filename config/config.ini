; EtherMVC Configuration File (.ini format)
; Comprehensive configuration for the EtherMVC framework

[System]
; Application name
Name = EtherMVC
; Version
Version = 1.0.0
; Application type: website or app
Type = website
; Environment: development, staging, production
Environment = development
; Debug mode
Debug = true

[Security]
; Enable security features
Enabled = true
; Encryption method: AES-256, AES-192, AES-128
EncryptionMethod = AES-256
; Enable CORS (Cross-Origin Resource Sharing)
EnableCors = true
; CORS origin
CorsOrigin = localhost
; Rate limiting
EnableRateLimit = true
RateLimitRequests = 100
RateLimitWindow = 60000
; CSRF protection
EnableCsrfProtection = true
; Input validation
EnableInputValidation = true

[Database]
; Database type: modern (JSON), retro (MySQL)
Type = modern
; Engine: json or mysql
Engine = json
; Encryption for JSON: chimera
Encryption = chimera
; MySQL settings (if using retro)
Host = localhost
Port = 3306
Username = root
Password = 
DefaultDatabase = ethermvc
; Connection timeout (ms)
Timeout = 5000

[View]
; Default theme
Theme = theme1
; Enable error console
ErrorConsoleEnabled = true
; Sanitize HTML output
SanitizeHtml = true
; Prevent XSS attacks
PreventXss = true
; Hide sensitive data from views
HideSensitiveData = true

[Assets]
; Enable CDN
CdnEnabled = false
; Minify CSS and JavaScript
Minify = true
; Optimize images
OptimizeImages = true

[Logging]
; Enable logging
Enabled = true
; Log level: debug, info, warning, error, critical
Level = info
; Log to file
LogToFile = true
; Log file path
LogPath = ./Logs/
; Maximum log file size
MaxFileSize = 10MB
; Retention days
RetentionDays = 30

[Performance]
; Enable caching
CachingEnabled = true
; Cache TTL (Time To Live) in seconds
CacheTTL = 3600
; Enable compression
CompressionEnabled = true

[Development]
; Hot reload on file change
HotReload = true
; Show detailed error messages
DetailedErrors = true
; Enable profiling
Profiling = false
