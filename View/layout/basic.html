<!-- Basic Layout Template -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtherMVC - Basic Layout</title>
    <link rel="stylesheet" href="../rendering.css">
</head>
<body>
    <div class="ether-layout basic">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1>Build Secure Web Applications</h1>
                <p>With EtherMVC Framework</p>
            </div>
        </section>

        <!-- Sidebar -->
        <div class="layout-container">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <h3>Menu</h3>
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/dashboard">Dashboard</a></li>
                        <li><a href="/users">Users</a></li>
                        <li><a href="/settings">Settings</a></li>
                    </ul>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Content will be inserted here -->
                <div class="content-placeholder">
                    <p>Content area - pages will be loaded here</p>
                </div>
            </main>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 EtherMVC Framework. Secure web development made simple.</p>
        </footer>
    </div>
</body>
</html>
