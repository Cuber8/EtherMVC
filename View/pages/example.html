<!-- Example Page Template -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Example Page</title>
</head>
<body>
    <div class="page-container">
        <h1>Example Page</h1>
        
        <!-- Example Form -->
        <div class="form-section">
            <h2>Contact Form Example</h2>
            <form data-ether-form data-ether-endpoint="/api/contact">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>

        <!-- Example Data Display -->
        <div class="data-section">
            <h2>Data Display Example</h2>
            <div id="data-container">
                <p>Data will be loaded here via API...</p>
            </div>
        </div>

        <!-- Example Action Button -->
        <div class="action-section">
            <h2>Action Example</h2>
            <button class="btn btn-success" data-ether-action="GET:/api/data">Load Data</button>
        </div>
    </div>

    <script>
        // Example page initialization
        if (window.EtherUX) {
            // Listen for form submissions
            document.addEventListener('form-submit-success', (e) => {
                console.log('Form submitted successfully:', e.detail);
            });

            // Load data on button click
            const loadBtn = document.querySelector('[data-ether-action="GET:/api/data"]');
            if (loadBtn) {
                loadBtn.addEventListener('click', async () => {
                    try {
                        const result = await window.EtherUX.get('/api/data');
                        document.getElementById('data-container').innerHTML = 
                            '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
                    } catch (error) {
                        console.error('Failed to load data:', error);
                    }
                });
            }
        }
    </script>
</body>
</html>
